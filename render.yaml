services:
  - type: web
    name: findoor-backend
    runtime: node
    rootDir: web/backend
    buildCommand: npm ci --only=production
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 30d
      - key: FRONTEND_URL
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      # AI service URLs (set after first deploy — use the actual Render URLs)
      - key: FASTAPI_URL
        value: https://findoor-ai.onrender.com
      - key: AI_API_KEY
        sync: false
      - key: FLASK_OCR_URL
        value: https://findoor-ocr.onrender.com

  - type: web
    name: findoor-frontend
    runtime: static
    rootDir: web/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: findoor-ai
    runtime: python
    rootDir: ai/ai-gateway
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn Backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: meta-llama/llama-3.3-70b-instruct:free
      - key: GOOGLE_API_KEY
        sync: false
      - key: API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"

  - type: web
    name: findoor-ocr
    runtime: docker
    rootDir: ai/ocr
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_VISION_MODEL
        value: google/gemma-4-31b-it:free
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_VISION_MODEL
        value: gemini-2.0-flash
      - key: PORT
        value: "5001"
