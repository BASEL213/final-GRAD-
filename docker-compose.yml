version: '3.9'

services:
  backend:
    build: ./web/backend
    container_name: findoor-backend
    restart: unless-stopped
    env_file: ./web/backend/.env
    environment:
      - NODE_ENV=production
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build: ./web/frontend
    container_name: findoor-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  ai-gateway:
    build: ./ai/ai-gateway
    container_name: findoor-ai
    restart: unless-stopped
    env_file: ./ai/ai-gateway/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: findoor-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  uploads_data:
