name: Findoor CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── Node.js Backend ──────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: web/backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        env:
          MONGODB_URI: mongodb://localhost:27017/findoor_test
          JWT_SECRET: ci_test_secret_not_for_production
          NODE_ENV: test
          PORT: 3001
        run: npm test

  # ── AI Gateway ───────────────────────────────────────────────────────────
  ai-lint:
    name: AI Gateway Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ai/ai-gateway/Backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check . --select E,W,F --ignore E501

  # ── Docker Build Check ───────────────────────────────────────────────────
  docker-build:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    needs: [backend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Create minimal .env files for build check
        run: |
          printf 'PORT=3000\nMONGODB_URI=mongodb://localhost:27017/findoor\nJWT_SECRET=ci_secret\nNODE_ENV=production\n' > web/backend/.env
          printf 'GROQ_API_KEY=dummy\nGEMINI_API_KEY=dummy\nAPI_KEY=dummy\nMONGODB_URI=mongodb://localhost:27017/findoor\n' > ai/ai-gateway/.env

      - name: Build images
        run: docker compose build --no-cache
